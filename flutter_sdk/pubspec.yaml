name: ksandra_license
description: Production-ready plug-and-play License SDK for Flutter. Automatically handles licensing, features, device registration, caching, and offline mode. Just configure serverUrl and projectApiKey.
version: 1.1.0
homepage: https://github.com/ksandra/ksandra_license

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

# To use this SDK in your Flutter app:
# Add to pubspec.yaml:
#   ksandra_license:
#     path: ../flutter_sdk
#
# Then import:
#   import 'package:ksandra_license/license_sdk.dart';
